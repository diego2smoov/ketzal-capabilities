<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent | Ketzal Unmanned</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background-color: #050505; color: #ededed; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>

  <nav class="bg-[#050505] border-b border-[#1f1f23]">
    <div class="max-w-3xl mx-auto px-5 py-4">
      <a href="/" class="text-2xl font-semibold tracking-tight hover:text-[#006865] transition-colors">KETZAL</a>
    </div>
  </nav>

  <main class="max-w-xl mx-auto px-5 py-20 md:py-28 text-center">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-[#006865]/20 text-[#006865] text-2xl mb-6">
      <i class="fa-solid fa-check"></i>
    </div>
    <h1 class="text-3xl font-semibold mb-4">Message sent</h1>
    <p class="text-[#9f9fa8] mb-8 leading-relaxed">
      Thanks for reaching out. We received your message and will get back to you at the email you provided.
    </p>
    <a href="/" class="inline-block px-8 py-3.5 text-sm font-semibold rounded-full bg-[#006865] hover:bg-[#00524f] text-white transition-colors">
      Back to Home
    </a>
  </main>

  <footer class="bg-[#050505] py-10 text-center text-sm text-[#6f6f78] border-t border-[#1f1f23]">
    <p>© 2026 Ketzal Unmanned • Chandler, Arizona</p>
  </footer>

</body>
</html>
