[build]
  publish = "."
  command = "echo 'Static site — no build step'"

[[redirects]]
  from = "/capabilities"
  to = "/index-capabilities.html"
  status = 200

[[redirects]]
  from = "/production"
  to = "/index-capabilities.html"
  status = 200

[[redirects]]
  from = "/landing"
  to = "/ketzal-landing.html"
  status = 200

[[redirects]]
  from = "/preview"
  to = "/index-preview.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"